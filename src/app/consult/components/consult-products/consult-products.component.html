<div class="wrapper">
    <div class="synopsis">
        <h3>Consulting</h3>
        <p>we offer wide expertise in many domains in the field of software consulting. Below are the few.</p>
    </div>
    <div class="product-section">
        <h4 class="products-header">
            <span class="divider-left"></span>
            <span class="heading-text">Banking & Finanical services</span>
            <span class="divider-right"></span>
        </h4>
        <div class="cards">
            <div class="ca" *ngFor="let card of bankProducts">
                <ng-container *ngTemplateOutlet="cardTpl; context: {card}">
                </ng-container>
            </div>
        </div>
    </div>
    <div class="product-section">
        <h4 class="products-header">
            <span class="divider-left"></span>
            <span class="heading-text">Capital markets services</span>
            <span class="divider-right"></span>
        </h4>
        <div class="cards">
            <div class="ca" *ngFor="let card of marketProducts">
                <ng-container *ngTemplateOutlet="cardTpl; context: {card}">
                </ng-container>
            </div>
        </div>
    </div>
    <div class="product-section">
        <h4 class="products-header">
            <span class="divider-left"></span>
            <span class="heading-text">Data & Artificial Intelligence</span>
            <span class="divider-right"></span>
        </h4>
        <div class="cards">
            <div class="ca" *ngFor="let card of aiProducts">
                <ng-container *ngTemplateOutlet="cardTpl; context: {card}">
                </ng-container>
            </div>
        </div>
    </div>
</div>

<ng-template #cardTpl let-card="card">
    <mat-card class="product-card" appearance="outlined">
        <mat-card-header>
            <mat-card-title>{{card.title}}</mat-card-title>
        </mat-card-header>
        <img mat-card-image loading="lazy" [src]="path.AppendPath(card.img)" [alt]="card.alt">
        <mat-card-content>
            <p>
                {{card.desc}}
            </p>
        </mat-card-content>
        <mat-card-actions>
            <button mat-button color="primary" (click)="Navigate(card.targetRoute, card.param)">learn more</button>
        </mat-card-actions>
    </mat-card>

</ng-template>
