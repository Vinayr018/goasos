<div class="wrapper">
    <h2>Home Automation</h2>
    <div class="boxes">
        <div *ngFor="let m of boxes" class="homebox">
            <div class="img">
                <img loading="lazy" [src]="m.img" [alt]="m.alt">
            </div>
            <div class="content">
                <h3 class="header">{{m.header}}</h3>
                <p>{{m.body}}</p>
            </div>
        </div>
    </div>
</div>
