<div class="wrapper">
    <h2>{{title}}</h2>
    <div class="boxes">
        <div *ngFor="let i of boxes;let index = index" class="homebox"
            [ngStyle]="{ 'animation-delay': index * 0.3 + 's' }">
            <app-box [img]="base.AppendPath(i.img)" [alt]="i.alt" [header]="i.header" [body]="i.body" />
        </div>
    </div>
</div>
