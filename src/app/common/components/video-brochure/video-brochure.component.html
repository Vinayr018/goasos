<div class="wrapper">
    <h2>{{title}}</h2>
    <div class="boxes">
        <div *ngFor="let i of boxes;let index = index" class="homebox"
            [ngStyle]="{ 'animation-delay': index * 0.3 + 's' }"
            [attr.id]="i.id">
            <app-video-box [src]="base.AppendPath(i.src)" 
            [poster]="i.poster" [header]="i.header" [body]="i.body" />
        </div>
    </div>
</div>
