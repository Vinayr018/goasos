<div class="wrapper" (click)="ToggleMenu()">
    <div class="selected-items">
        <span>1</span>
        <span>2</span>
    </div>
    <button class="triangle" [ngClass]="IsMenuActive ? 'open' : ''" type="button"
        (click)="ToggleMenu()"><span></span></button>
    <ul [ngClass]="IsMenuActive ? 'open':''">
        <li><span>1</span></li>
        <li><span>2</span></li>
        <li><span>3</span></li>
        <li><span>4</span></li>
    </ul>
</div>
