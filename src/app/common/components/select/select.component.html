<div class="wrapper" (click)="ToggleMenu($event,false)" #wrap>
    <div class="selected-items">
        <ng-container *ngFor="let item of SelectedItemList"><span>{{item}}</span></ng-container>
    </div>
    <button class="triangle" [ngClass]="IsMenuActive ? 'open' : ''" type="button"
        (click)="ToggleMenu($event,true)"><mat-icon fontIcon="arrow_drop_down"></mat-icon></button>
    <ul [ngClass]="IsMenuActive ? 'open':''" #options>
        <ng-container *ngFor="let item of items">
            <li (click)="ItemClickEvent(item, $event)"><span>{{item.value}}</span></li>
        </ng-container>
    </ul>
</div>
